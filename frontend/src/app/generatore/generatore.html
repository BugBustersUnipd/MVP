<div class="generator-container">
    <div class="d-flex justify-content-end">
        <app-button label="Genera" class="btn btn-primary" [fluid]="true" (action)="generate()"/>
    </div>
    <div class="menu-row mb-4" >
        <menutendina [options]="(companies$ | async)" [selected]="selectedCompany" (selectedChange)="selectedCompany = $event; onCompanyChange($event)" label="Aziende" placeholder="Seleziona un'azienda" [showAddNew]="false" [showRemove]="false"></menutendina>
        @if (selectedCompany) {
            <menutendina [options]="(tones$ | async)" [(selected)]="selectedTone" label="Toni" placeholder="Seleziona un tono" [addButtonLabel]="'Nuovo tono'" (remove)="removeOption($event, 'tone')" (addNew)="openAddDialog('tone')"></menutendina>
            <menutendina [options]="(styles$ | async)" [(selected)]="selectedStyle" label="Stili" placeholder="Seleziona uno stile" [addButtonLabel]="'Nuovo stile'" (remove)="removeOption($event, 'style')" (addNew)="openAddDialog('style')"></menutendina>
        }
    </div>
    <app-prompt [(prompt)]="prompt" label="Prompt" [autoResize]="true"></app-prompt>
</div>
<app-add-dialog [(visible)]="addDialogVisible" [type]="addDialogType" (saveRequested)="handleAddDialogSave($event)"></app-add-dialog>
