<p-dialog
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [style]="{ width: '40rem', maxWidth: '95vw' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <h1 class="p-dialog-title">{{ dialogTitle }}</h1>
  </ng-template>

  <div class="d-flex flex-column gap-3">
    <div class="d-flex flex-column gap-2">
      <label class="label" for="add-name">Nome*</label>
      <input
        id="add-name"
        type="text"
        class="form-control w-100 border rounded-2 px-3 py-2"
        [(ngModel)]="name"
        [ngClass]="{ 'is-invalid': submitted && !name.trim() }"
        placeholder="Inserisci un nome"
      />
      @if (submitted && !name.trim()) {
        <small class="error">Il nome e obbligatorio.</small>
      }
    </div>

    <div class="field-block">
      <label class="label" for="add-description">Descrizione espansiva</label>
      <textarea
        id="add-description"
        class="form-control w-100 border rounded-2 px-3 py-2"
        [(ngModel)]="description"
        rows="4"
        placeholder="Inserisci una descrizione (opzionale)"
      ></textarea>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <app-button label="Annulla" class="btn-secondary" (action)="close()"></app-button>
      <app-button [label]="saveLabel" class="btn-primary" (action)="save()"></app-button>
    </div>
  </div>
</p-dialog>
