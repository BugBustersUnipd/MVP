<div class="card">
	<h3 class="section-title">Altri documenti estratti</h3>

	<p-table
		[value]="rows"
		[paginator]="true"
		[rows]="5"
		[rowsPerPageOptions]="[5, 10, 20]"
		[tableStyle]="{ 'min-width': '40rem' }"
	>
		<ng-template pTemplate="header">
			<tr>
				<th style="width: 20%">ID</th>
				<th style="width: 55%">Destinatario</th>
				<th style="width: 17%">Confidenza</th>
				<th style="width: 8%"></th>
			</tr>
		</ng-template>

		<ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
			<tr>
				<td>{{ row.id }}</td>
				<td>{{ row.destinatario }}</td>
				<td>{{ row.confidenza }}%</td>
				<td class="actions-cell">
					<button
						type="button"
						pButton
						icon="pi pi-trash"
						class="p-button-text p-button-danger p-button-sm"
						(click)="requestRowRemoval(rowIndex)"
						aria-label="Rimuovi riga"
					></button>
				</td>
			</tr>
		</ng-template>
	</p-table>
</div>
