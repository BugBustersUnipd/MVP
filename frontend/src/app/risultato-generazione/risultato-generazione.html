@if (result(); as result) {
    <div class="menu">
        @if(result.id==null && isEditable){
            <div class="actions">
                <app-button label="Annulla Modifiche" class="btn btn-secondary" [fluid]="true" (action)="cancelEditing()"></app-button>
                <app-button label="Salva Modifiche" class="btn btn-primary" [fluid]="true" [disabled]="!hasPendingModifications" (action)="saveChanges()"></app-button>
            </div>
        }@else if(result.generatedDatumId!=null && result.id==null){
            <div class="actions">
                <app-button label="Rigenera" class="btn btn-secondary" [fluid]="true" (action)="onRigenera(result.generatedDatumId)"></app-button>
                <app-button label="Salva" class="btn btn-primary" [fluid]="true" (action)="onSalva()"></app-button>
            </div>
            <div class="p-2 mb-3">
                <app-dialog Icon="assets/icons/cross.svg" message="Vuoi cancellare questa generazione?" header="Attenzione"
                    (confirmed)="deleteGeneration()">
                </app-dialog>
            </div>
        }@else if(result.id!=null) {
            <div class="actions">
                <app-button label="Elimina" class="btn btn-danger" [fluid]="true" (action)="deleteGeneration()"></app-button>
            </div>
        }
    
    </div>
    <div class="body">
        <div class="image-container">
            <bb-image-title [imageTitle]="getTitleValue()" [imageUrl]="getImagePathValue()" [editable]="isEditable" [loading]="isImageTitleLoading"
                (imageTitleChange)="onFieldModified('title', $event)"
                (imageChange)="changeImage($event)"
            >
            </bb-image-title>
        </div>

        <div class="output-container">
            <app-editor [text]="getContentValue()" [editable]="isEditable" [loading]="isContentLoading" (textChange)="onFieldModified('content', $event)"></app-editor>
        </div>

        <div class="d-flex gap-3">
            <div class="valutazione">
                <app-valutazione [rating]="result.evaluation" (ratingChange)="onRatingChange($event)"></app-valutazione>
            </div>
            
            @if(result.id==null){
                <div class="modifica ms-auto d-flex align-items-end">
                    <app-button label="Modifica" class="btn btn-primary" [fluid]="true" (action)="enableEditing()"></app-button>
                </div>
            }@else if(result.id!==null){
                <div class="data-container">
                    <label class="label mb-1">Data di generazione:</label>
                    <div class="data-generazione bg-white p-1 rounded">
                        <span>{{ result.data | date:'dd/MM/yyyy' }}</span>
                    </div>
                </div>
            }
        </div>
    
        <!-- Sezione riepilogativa dei parametri scelti dall'utente nel Generatore -->
        <!-- Tutti i campi hanno [disabled]="true": non sono cliccabili né focalizzabili -->
        <div class="parametri-container">
            <span class="fs-9 text-muted fw-bold">PARAMETRI INSERITI</span>
            <hr class="parametri-divider">
            @if(result.id!==null){
                <div class="actions">
                    <app-button 
                        label="Riutilizza" 
                        class="btn btn-primary" 
                        [fluid]="true" 
                        [disabled]="!result.style.isActive || !result.tone.isActive"
                        (action)="reuseGeneration()">
                    </app-button>
                    <app-button 
                        label="Duplica" 
                        class="btn btn-primary" 
                        [fluid]="true" 
                        (action)="duplicateGeneration()">
                    </app-button>
                </div>
            }
            <div>
                 <div class="menu-row mb-3">
                     <menutendina [options]="[result.company]" [selected]="result.company"
                         label="Azienda" placeholder="Nessuna azienda selezionata" [disabled]="true"></menutendina>
                     <menutendina [options]="[result.tone]" [selected]="result.tone"
                         label="Tono" placeholder="Nessun tono selezionato" [disabled]="true" [ngClass]="result.tone.isActive==false?'text-danger':''"></menutendina>
     
                     <menutendina [options]="[result.style]" [selected]="result.style"
                         label="Stile" placeholder="Nessuno stile selezionato" [disabled]="true" [ngClass]="result.style.isActive==false?'text-danger':''"></menutendina>
                 </div>
                <app-prompt [prompt]="result.prompt" label="Prompt" [autoResize]="true" [disabled]="true"></app-prompt>
            </div>
        </div>
    
    </div>
}
