@if (result; as result) {
    <div class="menu">
        @if(!result.isPost && isEditable){
            <div class="actions">
                <app-button label="Annulla Modifiche" class="btn btn-secondary" [fluid]="true" (action)="cancelEditing()"></app-button>
                <app-button label="Salva Modifiche" class="btn btn-primary" [fluid]="true" [disabled]="!hasPendingModifications" (action)="saveChanges()"></app-button>
            </div>
        }@else if(!result.isPost){
            <div class="actions">
                <app-button label="Rigenera" class="btn btn-secondary" [fluid]="true" (action)="onRigenera(result.id)"></app-button>
                <app-button label="Salva" class="btn btn-primary" [fluid]="true" (action)="onSalva()"></app-button>
            </div>
            <div class="p-2 mb-3">
                <app-dialog Icon="assets/icons/cross.svg" message="Vuoi cancellare questa generazione?" header="Attenzione"
                    (confirmed)="deleteGeneration()">
                </app-dialog>
            </div>
        }
    
    </div>
    <div class="body">
        <div class="image-container">
            <bb-image-title [imageTitle]="getTitleValue()" [imageUrl]="getImagePathValue()" [editable]="isEditable"
                (imageTitleChange)="onFieldModified('title', $event)"
                (imageChange)="changeImage($event)"
            >
            </bb-image-title>
        </div>

        <div class="output-container">
            <app-editor [text]="getContentValue()" [editable]="isEditable" (textChange)="onFieldModified('content', $event)"></app-editor>
        </div>

        <div class="d-flex gap-3">
            <div class="valutazione">
                <app-valutazione [rating]="result.evaluation" (ratingChange)="onRatingChange($event)"></app-valutazione>
            </div>
            
            @if(!result.isPost){
                <div class="modifica ms-auto d-flex align-items-end">
                    <app-button label="Modifica" class="btn btn-primary" [fluid]="true" (action)="enableEditing()"></app-button>
                </div>
            }@else{
                <div class="data-container">
                    <label class="label mb-1">Data di generazione:</label>
                    <div class="data-generazione bg-white p-1 rounded">
                        <span>{{ result.data | date:'dd/MM/yyyy' }}</span>
                    </div>
                </div>
            }
        </div>
    
        <!-- Sezione riepilogativa dei parametri scelti dall'utente nel Generatore -->
        <!-- Tutti i campi hanno [disabled]="true": non sono cliccabili né focalizzabili -->
        <div class="parametri-container">
            <span class="fs-9 text-muted fw-bold">PARAMETRI INSERITI</span>
            <hr class="parametri-divider">
            @if(result.isPost){
                <div class="actions">
                    <app-button label="Riusa" class="btn btn-primary" [fluid]="true" (action)="reuseGeneration()"></app-button>
                    <app-button label="Duplica" class="btn btn-primary" [fluid]="true" (action)="duplicateGeneration()"></app-button>
                </div>
            }
            <div>
                 <div class="menu-row mb-3">
                     <menutendina [options]="[result.tone]" [selected]="result.tone"
                         label="Tono" placeholder="Nessun tono selezionato" [disabled]="true"></menutendina>
     
                     <menutendina [options]="[result.style]" [selected]="result.style"
                         label="Stile" placeholder="Nessuno stile selezionato" [disabled]="true"></menutendina>
                 </div>
                <app-prompt [prompt]="result.prompt" label="Prompt" [autoResize]="true" [disabled]="true"></app-prompt>
            </div>
        </div>
    
    </div>
}
